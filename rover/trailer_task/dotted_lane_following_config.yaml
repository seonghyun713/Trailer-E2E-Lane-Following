  height: 720         #HTTP 화면 세로 크기(px)
  keep_aspect: true   #브라우저 preview에서 원본 비율 유지
  fps: 6              #HTTP MJPEG 송출 FPS
  jpeg_quality: 65    #HTTP JPEG 품질(30~95)
