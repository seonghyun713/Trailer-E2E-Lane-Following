  recovery_trailer_scale: 1.0           #recovery 모드 trailer angle feedback scale
  straight_alpha_gain: 0.004            #직진 trailer angle error gain
  corner_alpha_gain: 0.006              #코너 trailer angle error gain
  recovery_alpha_gain: 0.018            #recovery trailer angle error gain
  alpha_rate_gain: 0.0008               #trailer angle rate feedback gain
  alpha_feedback_sign: 1.0              #trailer angle feedback 조향 부호
  corner_alpha_ref_deg: 26.0            #코너에서 허용/목표 trailer 각도(deg)
  corner_enter_confidence: 0.45         #코너 모드 진입 curvature confidence
  corner_exit_confidence: 0.22          #코너 모드 탈출 curvature confidence
  min_corner_frames: 8                  #코너 상태 최소 유지 프레임 수
  corner_min_rows: 5                    #코너 판단에 필요한 최소 lane row 수
  corner_detection_mode: shift          #shift=기존 far-near center shift 기반 코너 판단
  corner_curve_start_norm: 0.08         #2차 곡률 confidence 시작값; 작을수록 코너를 쉽게 봄
  corner_curve_full_norm: 0.28          #2차 곡률 confidence 1.0 값
  corner_diagonal_slope_start_norm: 0.16  #직선 대각선으로 보기 시작하는 1차 slope 크기
  corner_diagonal_curvature_ratio: 0.35   #곡률/slope 비율이 이보다 작으면 대각선 직선으로 감쇠
  corner_diagonal_conf_scale: 0.25        #대각선 직선으로 판단될 때 corner confidence 배율
  corner_single_solid_only_conf_scale: 0.60  #single solid recovery만 있을 때 corner confidence 배율
  corner_shift_start_norm: 0.1          #legacy fallback용: 기존 far-near shift confidence 시작 비율
  corner_shift_full_norm: 0.28          #legacy fallback용: 기존 far-near shift confidence 1.0 비율
  curvature_proxy_gain: 2.2             #곡률 값을 steering feedforward용 proxy로 키우는 gain
