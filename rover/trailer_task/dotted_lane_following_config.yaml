project:           #프로젝트 메타 정보
  name: dotted_lane_following                                                     #실행/로그에서 사용할 프로젝트 이름
  description: SegFormer dotted-centerline lane following for the trailer rover.  #설정 파일 설명
camera:            #카메라 입력 설정
  source: csi                  #입력 소스; CSI 카메라 사용
  capture_width: 1280          #센서 캡처 원본 가로 해상도(px)
  capture_height: 720          #센서 캡처 원본 세로 해상도(px)
  output_width: 640            #처리용 출력 프레임 가로 해상도(px)
  output_height: 360           #처리용 출력 프레임 세로 해상도(px)
  fps: 6                      #카메라 목표 프레임레이트
  appsink_format: RGBA         #GStreamer appsink 픽셀 포맷
  timeout_ms: 90               #프레임 read 대기 시간(ms)
  parallel_open: true          #두 카메라를 병렬로 열지 여부
  parallel_read: true          #두 카메라 프레임을 병렬 read해서 루프 대기 시간을 줄임
  state_timeout_s: 0.8         #GStreamer 상태 전환 대기 시간(s)
  first_frame_timeout_ms: 650  #카메라 오픈 후 첫 프레임 대기 시간(ms)
  open_delay_s: 0.0            #카메라 순차 오픈 시 카메라 사이 지연(s)
  argus_release_delay_s: 0.05  #CSI 카메라 해제 후 Argus 안정화 대기(s)
  cameras:                     #카메라별 설정
    cam1:  #왼쪽 전방/미러 카메라
      label: left_front_lane       #사람이 읽기 쉬운 카메라 이름
      sensor_id: 1                 #Jetson CSI 센서 ID
      enabled: true                #이 카메라 사용 여부
      crop:                        #차선 세그멘테이션에 사용할 crop 영역(정규화 좌표)
        x: 0.26  #crop 시작 x 비율
        y: 0.0   #crop 시작 y 비율
        w: 0.74  #crop 너비 비율
        h: 1.0   #crop 높이 비율
      roi:                         #트레일러 패널 YOLO/각도 추정용 ROI(정규화 좌표)
        x: 0.0      #ROI 시작 x 비율
        y: 0.1492   #ROI 시작 y 비율
        w: 0.21609  #ROI 너비 비율
        h: 0.2963   #ROI 높이 비율
      trailer_angle_sign: 1.0      #이 카메라 각도 부호 보정값
      vehicle_center_x_bias: 0.08  #이 카메라 단독 BEV에서 차량 중심 x 보정
    cam0:  #오른쪽 전방/미러 카메라
      label: right_front_lane       #사람이 읽기 쉬운 카메라 이름
      sensor_id: 0                  #Jetson CSI 센서 ID
      enabled: true                 #이 카메라 사용 여부
      crop:                         #차선 세그멘테이션에 사용할 crop 영역(정규화 좌표)
        x: 0.0   #crop 시작 x 비율
        y: 0.0   #crop 시작 y 비율
        w: 0.72  #crop 너비 비율
        h: 1.0   #crop 높이 비율
      roi:                          #트레일러 패널 YOLO/각도 추정용 ROI(정규화 좌표)
        x: 0.77669  #ROI 시작 x 비율
        y: 0.05829  #ROI 시작 y 비율
        w: 0.22331  #ROI 너비 비율
        h: 0.30303  #ROI 높이 비율
      trailer_angle_sign: -1.0      #이 카메라 각도 부호 보정값
      vehicle_center_x_bias: -0.08  #이 카메라 단독 BEV에서 차량 중심 x 보정
  edge_color_fix:              #카메라 가장자리 색 틀어짐 보정
    enabled: true        #색 보정 사용 여부
    width_ratio: 0.32    #좌우 가장자리 보정 영역 폭 비율
    strength: 0.75       #색 보정 강도
    green_recovery: 0.7  #녹색 채널 복원 강도
preprocess:        #공통 전처리 설정
  crop:  #카메라별 crop이 없을 때 사용할 기본 crop
    x: 0.0  #기본 crop 시작 x 비율
    y: 0.0  #기본 crop 시작 y 비율
    w: 1.0  #기본 crop 너비 비율
    h: 1.0  #기본 crop 높이 비율
models:            #모델 경로 및 추론 설정
  segmentation:  #차선 세그멘테이션 모델 설정
    weights: ../../track_riding/model_car_jetson/weights/segmentation/segformer_b0_yellow_line_best_model  #PyTorch 원본 SegFormer 가중치 경로
    device: auto                                                                                           #추론 장치; auto는 CUDA 가능 시 GPU
    half: true                                                                                             #CUDA 사용 시 FP16 추론 사용 여부
    backend: trt                                                                                           #ONNX Runtime TensorRT EP 우선 사용
    onnx: optimized_models/segformer_b0_yellow_line_512x288.onnx                                           #최적화된 ONNX 모델 경로
    onnx_trt_cache: optimized_models/ort_trt_cache                                                         #ONNX Runtime TensorRT 엔진 캐시 경로
    torchscript: optimized_models/segformer_b0_yellow_line_512x288_fp16.ts                                 #TorchScript FP16 모델 경로
    model_width: 512                                                                                       #세그멘테이션 모델 입력 가로 크기(px)
    model_height: 288                                                                                      #세그멘테이션 모델 입력 세로 크기(px)
    fast_postprocess: true                                                                                 #logits를 작은 해상도에서 argmax 후 mask만 resize
  panel:         #트레일러 AI 패널 YOLO 모델 설정
    enabled: true                                                 #패널 검출 및 각도 추정 사용 여부
    weights: runs_yolo/trailer_panel_yolo11n/weights/best.engine  #YOLO TensorRT engine 경로
    imgsz: 416                                                    #YOLO 입력 이미지 크기
    conf: 0.18                                                    #YOLO 최소 confidence threshold
    iou: 0.55                                                     #YOLO NMS IoU threshold
    device: auto                                                  #YOLO 추론 장치 설정
    infer_every: 1                                                #몇 프레임마다 YOLO를 실행할지
    class_name: trailer_ai_panel                                  #검출할 YOLO 클래스 이름
    roi_expand_enabled: true                                      #미러 ROI 주변을 확장해서 검출할지 여부
    roi_expand_x: 0.45                                            #ROI 가로 확장 비율
    roi_expand_y: 0.35                                            #ROI 세로 확장 비율
    roi_min_width_px: 360                                         #확장 ROI 최소 가로 크기(px)
    roi_min_height_px: 260                                        #확장 ROI 최소 세로 크기(px)
angle:             #트레일러 각도 추정/필터 설정
  calibration_csv: angle_calib_run_sign_filtered_20260607_223304/angle_calibration.csv  #각도 anchor 캘리브레이션 CSV
  linear_model_json: angle_calib_run_sign_filtered_20260607_223304/angle_model.json     #보조 선형 모델 JSON
  linear_model_weight: 0.0                                                              #선형 모델 보간 반영 비율(0이면 미사용)
  mutual_exclusion_enabled: true                                                        #양쪽 카메라 검출이 충돌할 때 하나만 선택
  min_detection_conf: 0.18                                                              #각도 anchor로 쓸 최소 패널 검출 confidence
  min_samples_per_anchor: 5                                                             #각 각도 anchor당 최소 샘플 수
  reliable_min_abs_deg: 0.0                                                            #신뢰 가능한 최소 절대각(deg); 이보다 작으면 confidence 감소
  reliable_max_abs_deg: 80.0                                                            #신뢰 가능한 최대 절대각(deg); 초과 시 confidence 감소
  extrapolate_margin_norm: 0.08                                                         #anchor 범위 밖 extrapolation 허용 margin
  snap_to_measurement: true                                                             #필터링 없이 새 측정값으로 즉시 갱신
  no_detection_policy: edge_or_zero                                                     #패널 미검출 시 edge/zero 처리 정책
  edge_missing_start_abs_deg: 45.0                                                      #마지막 각도가 이 이상이면 edge missing으로 판단(deg)
  edge_missing_output_abs_deg: 50.0                                                     #edge missing일 때 출력할 절대각(deg)
  edge_missing_confidence: 0.35                                                         #edge missing 출력 confidence
  center_missing_confidence: 0.25                                                       #중앙부 미검출 zero 출력 confidence
  max_jump_deg: 0.0                                                                     #프레임 간 최대 각도 변화 제한; 0이면 제한 없음
  filter_alpha: 1.0                                                                     #각도 필터 alpha; 1이면 측정값 즉시 반영
  min_output_confidence: 0.18                                                           #fused angle로 사용할 최소 confidence
  hold_timeout_s: 0.0                                                                   #미검출 시 마지막 각도 유지 시간(s)
  stale_timeout_s: 1.2                                                                  #각도 stale 판단 시간(s)
  near_zero_abs_deg: 13.0                                                               #near-zero deadband 절대각(deg)
  near_zero_confidence: 0.22                                                            #near-zero 출력 confidence
  no_detection_zero_after_s: 0.0                                                        #미검출 후 zero로 보내는 시간(s)
  clip_margin_px: 3                                                                     #bbox가 ROI 경계에 붙었는지 판단하는 margin(px)
  clipped_conf_scale: 0.55                                                              #bbox clipped 시 confidence 배율
  edge_extrapolated_conf_scale: 0.45                                                    #anchor 범위 밖 extrapolation confidence 배율
  table:                                                                                #center table 기반 각도 보정 설정
    use_center_x: true       #bbox center_x를 주 angle feature로 사용
    use_width_hint: true     #bbox width를 보조 angle hint로 사용
    width_hint_weight: 0.18  #width hint 반영 비율
    y_sanity_weight: 0.08    #bbox center_y sanity penalty 비율
bev:               #Bird's-Eye View 변환 설정
  mode: dual_homography  #양쪽 카메라 homography 기반 BEV 모드
  output_width: 640      #BEV 출력 가로 크기(px)
  output_height: 720     #BEV 출력 세로 크기(px)
  src_points_ratio:      #단일 카메라 fallback용 원근변환 원본점 비율
  - - 0.08               #bottom-left x 비율
    - 0.95  #bottom-left y 비율
  - - 0.92               #bottom-right x 비율
    - 0.95  #bottom-right y 비율
  - - 0.64               #top-right x 비율
    - 0.43  #top-right y 비율
  - - 0.36               #top-left x 비율
    - 0.43  #top-left y 비율
  dual:                  #dual BEV calibration 설정
    enabled: true                                #dual BEV 사용 여부
    calibration_file: dual_bev_calibration.yaml  #dual BEV 보정 파일 경로
    point_order:                                 #calibration point 순서
    - TL                                         #좌상단
    - TR                                         #우상단
    - BR                                         #우하단
    - BL                                         #좌하단
    dst_points_ratio:                            #BEV 목적지 사각형 좌표 비율
    - - 0.1                                      #TL x 비율
      - 0.08  #TL y 비율
    - - 0.9                                      #TR x 비율
      - 0.08  #TR y 비율
    - - 0.9                                      #BR x 비율
      - 0.95  #BR y 비율
    - - 0.1                                      #BL x 비율
      - 0.95  #BL y 비율
    vehicle_center_x_bias: 0.0                   #fused BEV 차량 중심 x 보정
    drive_mode: estimate_fusion                  #카메라별 lane estimate를 융합해 주행
    merge_mode: class_priority_max               #BEV mask 병합 방식; class 값 우선 max
lane:              #차선 추정 및 기본 주행 제어 설정
  fusion_mode: confidence_weighted_average  #카메라별 차선 명령 confidence 가중 평균
  control_mode: lateral_heading             #lateral error + heading error 기반 제어
  nominal_lane_width_px: 220.0              #기준 반차선/차선 폭(px)
  min_lane_width_px: 80.0                   #유효 차선 폭 최소값(px)
  max_lane_width_px: 420.0                  #유효 차선 폭 최대값(px)
  row_samples: 15                           #BEV에서 샘플링할 가로 row 개수
  row_y_min_ratio: 0.42                     #가장 먼 row y 비율
  row_y_max_ratio: 0.97                     #가장 가까운 row y 비율
  row_band_px: 18                           #각 row 주변에서 합산할 세로 band 반폭(px)
  min_component_pixels: 8                   #차선 component로 인정할 최소 픽셀 수
  solid_fallback_enabled: true              #점선이 안 보일 때 임시로 실선 기반 center 추종
  solid_fallback_min_rows: 4                #solid fallback 허용 최소 solid row 수
  solid_fallback_min_pair_rows: 2           #좌우 실선 pair midpoint row 최소 개수
  solid_fallback_min_confidence: 0.16       #solid fallback 허용 최소 lane confidence
  solid_fallback_confidence_scale: 0.78     #solid fallback confidence 감쇠 비율
  solid_fallback_speed: 0.12                #route controller 미사용 시 solid fallback 기본 속도
  lookahead_y_ratio: 0.65                    #기본 lookahead y 비율; 작을수록 더 먼 곳
  pure_pursuit_gain: 0.53                   #pure pursuit 모드 조향 gain
  lateral_gain: 0.55                         #lateral error feedback gain
  heading_gain: 0.38                        #heading error feedback gain
  steer_smoothing: 0.5                      #조향 출력 smoothing 비율
  center_smoothing: 0.6                     #차선 center smoothing 비율
  vehicle_center_x_bias: 0.0                #전체 BEV 차량 중심 x 보정
  min_confidence: 0.25                      #lane estimate 정상 판단 최소 confidence
  min_drive_confidence: 0.08                #주행 명령으로 사용할 최소 lane confidence
  base_speed: 0.17                          #기본 전진 속도 명령
  min_speed: 0.1                            #lane valid일 때 최소 전진 속도
  max_speed: 0.25                           #lane controller 최대 전진 속도
lane_pivot_assist:  #점선 추종 중 조향량에 따라 역방향 회전을 부드럽게 섞는 보조 믹서
  enabled: true                         #lane follow 중 counter-rotation assist 사용 여부
  mode: blended                         #blended=상시 부드러운 혼합, pulse=큰 오차 때 짧은 pulse
  start_abs_steer: 0.10                 #이 조향부터 역방향 assist를 아주 조금 섞기 시작
  full_abs_steer: 0.90                  #이 조향 이상이면 assist가 최대 비율로 들어감
  min_confidence: 0.40                  #이 lane confidence 이상에서만 assist 허용
  blend_smoothing: 0.35                 #assist 비율 smoothing; 클수록 부드럽고 느림
  outer_pwm: 0.20                       #assist 최대일 때 바깥쪽/전진 바퀴 목표 명령
  inner_reverse_pwm: 0.00               #0이면 직선 정렬 assist에서 안쪽 바퀴를 후진시키지 않음
  min_blend_to_send: 0.01               #이 비율보다 작으면 일반 휠 믹서 사용
  direction_sign: 1.0                   #반대로 돌면 -1.0으로 변경
  allow_in_corner: false                #코너 구간에서는 assist 비활성화
  post_corner_disable_s: 1.2            #코너 상태가 끝난 뒤 이 시간 동안 assist 비활성화
  allow_in_straight: false              #STRAIGHT에서는 점선 추종을 우선하고 assist 비활성화
  enter_abs_steer: 0.32                 #mode=pulse일 때 pulse 진입 조향 threshold
  pulse_duration_s: 0.12                #mode=pulse일 때 pulse 지속 시간
  cooldown_s: 0.25                      #mode=pulse일 때 pulse 후 재진입 대기 시간
corner_pivot:     #점선 lost + 실선 코너 방향 확실할 때 제자리 회전으로 점선 재획득
  enabled: true                         #corner pivot 상태 사용 여부
  pivot_pwm: 0.87                       #제자리 회전 좌/우 바퀴 절대 명령; 좌회전 L=-값/R=+값
  direction_sign: -1.0                  #-1이면 pivot 좌/우 방향 반전; 반대로 돌면 이 값만 바꾸기
  dashed_enter_max_rows: 1              #이 이하로 점선 row가 줄면 pivot 후보
  dashed_exit_min_rows: 4               #전체 점선 row가 이 이상이면 pivot 탈출 후보
  near_exit_min_dashed_rows: 2          #가까운 영역 점선 row가 이 이상이면 pivot 탈출 후보
  near_y_min_ratio: 0.70                #BEV y 이 비율보다 아래쪽을 눈앞/near 영역으로 판단
  solid_enter_min_rows: 3               #pivot 진입에 필요한 실선 기반 row 수
  solid_enter_min_pair_rows: 0          #0이면 한쪽 실선 recovery row만으로도 pivot 후보 허용
  corner_enter_confidence: 0.60         #실선 row 곡률 기반 코너 확신도 진입 threshold
  enter_confirm_frames: 2               #진입 조건 연속 확인 프레임 수
  exit_confirm_frames: 1                #점선 재획득 연속 확인 프레임 수
  min_lane_confidence: 0.12             #pivot 판단에 사용할 최소 lane confidence
  angle_stop_enabled: false             #false면 trailer angle 때문에 pivot을 강제 정지하지 않음
  max_abs_trailer_angle_deg: 999.0      #angle_stop 비활성화 중: 새 pivot 진입 각도 제한 사실상 해제
  stop_abs_trailer_angle_deg: 999.0     #angle_stop 비활성화 중: pivot 중 각도 정지 사실상 해제
  max_duration_s: 4.0                   #pivot 최대 지속 시간; 초과 시 정지
route_controller:  #트레일러 각도 인식 gain-scheduled route controller
  enabled: true                         #route-aware trailer controller 사용 여부
  simple_dashed_priority_enabled: true   #직선+점선 충분 시 복잡 제어 대신 기본 dashed follower 우선
  simple_dashed_min_confidence: 0.62     #simple dashed 우선 적용 최소 lane confidence
  simple_dashed_min_rows: 8              #simple dashed 우선 적용 최소 row 수
  simple_dashed_max_corner_confidence: 0.18  #이 이상이면 코너/회복 제어 유지
  simple_dashed_max_abs_angle_deg: 45.0  #트레일러 각도가 이보다 크면 angle-aware 제어 유지
  simple_dashed_speed_scale: 1.0         #simple dashed 명령 속도 배율
  simple_dashed_max_steer: 1.0           #simple dashed 명령 최대 조향
  straight_deadband_abs_angle_deg: 5.0  #직진 deadband trailer 절대각(deg)
