e2e_dataset:       #E2E 주행 학습용 데이터셋 저장; 세그/각도 모델은 별도라 BEV mask+angle+motor label만 저장
  enabled: true                         #주행 중 E2E 학습 샘플 저장 여부
  dir: e2e_dataset                      #각 run_dir 아래 저장될 데이터셋 폴더
  metadata_csv: metadata.csv            #BEV 경로, trailer angle, 최종 모터 출력 label CSV
  bev_mask_dir: bev_masks               #uint8 BEV segmentation mask 저장 폴더; 0=bg, 1=solid, 2=dashed
  save_input_gray: true                 #E2E 이미지 입력용 고대비 BEV grayscale도 저장; 0=bg, 127=solid, 255=dashed
  bev_input_dir: bev_input              #고대비 BEV grayscale 저장 폴더
  save_color_preview: false             #true면 사람이 보는 컬러 BEV preview도 같이 저장
