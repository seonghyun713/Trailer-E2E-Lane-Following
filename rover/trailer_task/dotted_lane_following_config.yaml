  baud: 115200                                           #serial baudrate
  arm: false                                             #기본 모터 출력 활성화 여부; true면 바로 송신 가능
  max_wheel_speed: 1                                     #좌/우 바퀴 명령 절대값 제한
  speed_gain: 1.1                                        #전진 속도 명령 gain
  steer_mix: 1.5                                         #조향 명령을 좌우 바퀴 차이로 섞는 gain
  min_forward_speed: 0.12                                #전진 시 최소 바퀴 명령
