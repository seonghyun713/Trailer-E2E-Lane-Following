  checkpoint: e2e_temporal_policy/runs/temporal_gru_20260611_182905/best.pt  #사용할 E2E policy checkpoint
  mode: shadow                         #shadow=기존 controller 주행+E2E 로그, assist=블렌딩, drive=E2E 직접 주행
  device: auto                         #auto면 CUDA 가능 시 GPU
  require_full_history: true           #history 10프레임이 쌓이기 전에는 E2E wheel 송신 금지
  output_scale: 1.05                   #모델 raw wheel 출력 배율; 약하면 올리고 강하면 낮춤
