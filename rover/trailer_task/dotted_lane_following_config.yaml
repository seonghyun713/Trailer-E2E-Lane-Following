  post_corner_bias_lookahead_y_ratio: 0.90  #bias 중 lookahead; 기존 직선 추종과 비슷하게 둠
  post_corner_bias_lane_scale: 0.85     #bias 중 차선 추종 강도
  post_corner_bias_trailer_scale: 0.10  #bias 중 trailer angle 보정은 약하게만 사용
  post_corner_bias_alpha_gain: 0.003    #bias 중 trailer angle gain
  post_corner_bias_curve_scale: 0.10    #bias 중 curvature feedforward 약화
  post_corner_bias_speed_scale: 0.95    #bias 중 전진 속도 배율
  post_corner_bias_max_steer: 0.75      #bias 중 최대 조향 제한
  post_corner_bias_ignore_corner_confidence: true  #bias 복귀 중 기울어진 옆선을 새 코너로 인식하지 않음
  post_corner_bias_corner_blind_after_s: 4.5     #bias 종료 직후 코너 재인식 지연 시간(s)
  post_corner_bias_disable_corner_pivot: true      #bias 복귀 중 corner pivot 진입 금지
  lookahead_smoothing: 0.0              #0이면 lookahead 변경 smoothing 없음; 위 값들이 같아서 항상 0.90
