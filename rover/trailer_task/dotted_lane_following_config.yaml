  curvature_sign: 1.0                   #curvature 방향 부호 보정
  straight_curve_scale: 0.12            #직진 모드 curvature feedforward scale
  base_speed: 0.18                      #route controller 기본 전진 속도
  min_speed: 0.20                       #route controller 최소 전진 속도
  max_speed: 0.27                      #route controller 최대 전진 속도
  corner_speed_scale: 0.52              #코너 모드 속도 배율
  recovery_speed_scale: 0.35            #recovery 모드 속도 배율
  angle_slow_speed_scale: 0.55          #trailer 각도 커질 때 속도 배율
  slow_confidence_threshold: 0.4        #lane confidence 낮을 때 감속 시작 threshold
  max_steer: 1.5                        #최종 조향 명령 절대값 제한
  min_angle_confidence: 0.18            #route controller가 사용할 최소 angle confidence
