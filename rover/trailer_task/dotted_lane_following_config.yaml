  post_corner_lane_scale: 0.55          #settle 중 차선 중앙 추종 강도
  post_corner_trailer_scale: 0.55       #settle 중 trailer angle 보정 강도
  post_corner_alpha_gain: 0.006         #settle 중 trailer angle error gain
  post_corner_curve_scale: 0.15         #settle 중 curvature feedforward scale
  post_corner_speed_scale: 0.85         #settle 중 전진 속도 배율
  post_corner_max_steer: 0.55           #settle 중 최대 조향 제한; 과한 제자리성 회전 방지
  post_corner_bias_enabled: true        #새 방식: 점선-바깥 실선 사이를 타다가 점선으로 부드럽게 복귀
  post_corner_bias_trigger_on_pivot_exit: true  #corner pivot에서 점선을 재획득하면 즉시 bias 상태 시작
  post_corner_bias_min_s: 0.8           #bias 주행 최소 유지 시간(s)
