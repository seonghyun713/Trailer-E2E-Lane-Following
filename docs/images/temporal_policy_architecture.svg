<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Trailer Temporal E2E Policy Architecture</title>
  <desc id="desc">Temporal GRU policy architecture using a sequence of BEV lane masks and trailer angle scalar features to predict left and right wheel commands plus an auxiliary driving mode.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#22313f"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1b2934" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #fbfbfc; }
      .title { font: 700 34px Arial, sans-serif; fill: #16212c; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #586979; }
      .box { rx: 14; fill: #ffffff; stroke-width: 2; filter: url(#shadow); }
      .input { fill: #eaf3ff; stroke: #78aee8; }
      .encoder { fill: #eaf7ef; stroke: #66bd83; }
      .temporal { fill: #eef2ff; stroke: #8a96d8; }
      .head { fill: #fff4df; stroke: #e2ab47; }
      .safe { fill: #ffeceb; stroke: #de7770; }
      .label { font: 700 18px Arial, sans-serif; fill: #17212b; }
      .body { font: 400 14px Arial, sans-serif; fill: #405263; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #687a8a; }
      .line { fill: none; stroke: #22313f; stroke-width: 3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #6f8394; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="56" y="66">Temporal E2E Policy Architecture</text>
  <text class="subtitle" x="58" y="96">A compact CNN + GRU policy imitates wheel commands from BEV lane history and trailer-angle dynamics.</text>

  <rect class="box input" x="72" y="160" width="300" height="138"/>
  <text class="label" x="96" y="204">BEV Mask Sequence</text>
  <text class="body" x="96" y="232">T = 10 frames</text>
  <text class="body" x="96" y="256">2 channels: solid, dashed</text>
  <text class="tiny" x="96" y="278">192 x 160 training input</text>

  <rect class="box input" x="72" y="394" width="300" height="150"/>
  <text class="label" x="96" y="438">Scalar Sequence</text>
  <text class="body" x="96" y="466">angle, angle_rate, confidence</text>
  <text class="body" x="96" y="490">age, valid flag, dt</text>
  <text class="tiny" x="96" y="512">one vector per history frame</text>

  <rect class="box encoder" x="462" y="150" width="302" height="160"/>
  <text class="label" x="486" y="194">Frame Encoder</text>
  <text class="body" x="486" y="224">ConvBlock x 4</text>
  <text class="body" x="486" y="248">channels: 24, 32, 48, 64</text>
  <text class="tiny" x="486" y="272">adaptive pool to 128-D feature</text>

  <rect class="box encoder" x="462" y="394" width="302" height="150"/>
  <text class="label" x="486" y="438">Scalar Embedding</text>
  <text class="body" x="486" y="466">Linear + LayerNorm + SiLU</text>
  <text class="tiny" x="486" y="490">6-D scalar to 32-D feature</text>

  <rect class="box temporal" x="854" y="244" width="308" height="172"/>
  <text class="label" x="878" y="290">Temporal Encoder</text>
  <text class="body" x="878" y="320">Concatenate image + scalar features</text>
  <text class="body" x="878" y="344">GRU hidden dim: 128</text>
  <text class="tiny" x="878" y="368">last time step summarizes the 2 s window</text>

  <rect class="box head" x="1240" y="144" width="214" height="130"/>
  <text class="label" x="1262" y="188">Motor Head</text>
  <text class="body" x="1262" y="216">tanh output</text>
  <text class="body" x="1262" y="240">wheel_left, wheel_right</text>

  <rect class="box head" x="1240" y="338" width="214" height="130"/>
  <text class="label" x="1262" y="382">Mode Head</text>
  <text class="body" x="1262" y="410">auxiliary logits</text>
  <text class="tiny" x="1262" y="434">normal, straight, corner, pivot, bias</text>

  <rect class="box safe" x="830" y="624" width="360" height="132"/>
  <text class="label" x="854" y="668">Live Safety Layer</text>
  <text class="body" x="854" y="696">warmup history, output scale, wheel clamp</text>
  <text class="body" x="854" y="720">delta limit, deadband, shadow/assist/drive mode</text>

  <rect class="box head" x="280" y="626" width="360" height="130"/>
  <text class="label" x="304" y="670">Training Objective</text>
  <text class="body" x="304" y="698">Huber wheel loss</text>
  <text class="body" x="304" y="722">+ weighted auxiliary mode CE</text>

  <path class="line" d="M372 229 L462 229"/>
  <path class="line" d="M372 469 L462 469"/>
  <path class="line" d="M764 230 C808 230, 812 294, 854 314"/>
  <path class="line" d="M764 469 C814 469, 814 370, 854 350"/>
  <path class="line" d="M1162 318 C1198 290, 1204 214, 1240 209"/>
  <path class="line" d="M1162 350 C1198 360, 1204 400, 1240 403"/>
  <path class="line" d="M1347 274 C1347 560, 1090 570, 1010 624"/>
  <path class="dash" d="M1010 416 L1010 624"/>
  <path class="dash" d="M640 690 L830 690"/>

  <text class="tiny" x="392" y="214">B,T,C,H,W</text>
  <text class="tiny" x="392" y="454">B,T,6</text>
  <text class="tiny" x="792" y="284">128-D</text>
  <text class="tiny" x="792" y="438">32-D</text>
  <text class="tiny" x="1190" y="194">shared head</text>
  <text class="tiny" x="1190" y="390">diagnostics</text>
  <text class="tiny" x="1194" y="574">selected wheel command</text>
</svg>
